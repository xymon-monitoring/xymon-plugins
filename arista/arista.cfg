[DEFAULT]
# Xymon server
XYMON_HOST         = xymon.example.com
XYMON_PORT         = 1984

# SSH credentials — Arista user EXEC mode (no enable required)
SSH_USER           = admin
SSH_KEY            = /etc/xymon/ssh/id_rsa_arista

# CPU used% thresholds (100 - idle from top output)
CPU_WARN           = 70
CPU_CRIT           = 85

# Memory used% thresholds
MEM_WARN           = 80
MEM_CRIT           = 90

# Per-port new flap count per poll interval before alerting
# A single new flap triggers yellow; 5+ in one 5-min cycle = red
FLAP_WARN          = 1
FLAP_CRIT          = 5

# Per-interface cumulative error+CRC count before alerting
IFACE_ERR_WARN     = 10
IFACE_ERR_CRIT     = 100

# Bandwidth commitment in Mbps (95th pct comparison)
COMMITMENT_MBPS    = 1000

# 95th pct rolling window in hours (288 samples at 5-min intervals = 24h)
BW_WINDOW_HOURS    = 24

# --- Switch instances ---
# Add a new [section] for each additional Arista switch.
# Keys here override [DEFAULT] values for that switch only.

[arista1]
HOST               = arista1.example.com
XYMON_HOSTNAME     = arista1.example.com
# Space-separated list of uplink ports for bandwidth monitoring and 95th pct.
# Use the port names exactly as shown in 'show interfaces' (e.g. Ethernet49/1).
UPLINK_PORTS       = Ethernet49/1 Ethernet50/1 Ethernet52/1 Ethernet53/1
COMMITMENT_MBPS    = 1000
