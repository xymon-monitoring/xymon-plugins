[DEFAULT]
# Required to distinguish Arista configs from other monitor types sharing the same CONF_DIR.
DEVICE_TYPE        = arista

# Xymon server
XYMON_HOST         = xymon.example.com
XYMON_PORT         = 1984

# SSH credentials — Arista user EXEC mode (no enable required)
SSH_USER           = admin
SSH_KEY            = /etc/xymon/ssh/id_rsa_arista

# CPU used% thresholds (100 - idle from top output)
CPU_WARN           = 70
CPU_CRIT           = 85

# Memory used% thresholds
MEM_WARN           = 80
MEM_CRIT           = 90

# Per-port new flap count per poll interval before alerting
# A single new flap triggers yellow; 5+ in one 5-min cycle = red
FLAP_WARN          = 1
FLAP_CRIT          = 5

# Per-interface cumulative error+CRC count before alerting
IFACE_ERR_WARN     = 10
IFACE_ERR_CRIT     = 100

# Ports whose flap counts are excluded from column color (errors still count).
# Use for ports with expected intermittent link changes that aren't actionable.
# Accepts abbreviated (Et43) or long (Ethernet43) names.  Port still appears in
# the interface table annotated [flap-ignored].
# FLAP_IGNORE_PORTS  =

# Ports fully silenced from column color (flaps AND errors suppressed).
# Use for devices that power-cycle or sleep/wake on a schedule (e.g. a Mac mini
# that sleeps overnight).  Port still appears in the interface table annotated
# [MUTED]; active issues are listed in the Flagged section for visibility.
# Accepts abbreviated (Et43) or long (Ethernet43) names.
# MUTED_PORTS        =

# Bandwidth commitment in Mbps (95th pct comparison)
COMMITMENT_MBPS    = 1000

# 95th pct rolling window in hours (288 samples at 5-min intervals = 24h)
BW_WINDOW_HOURS    = 24

# --- Switch instances ---
# Add a new [section] for each additional Arista switch.
# Keys here override [DEFAULT] values for that switch only.

[arista1]
HOST               = arista1.example.com
XYMON_HOSTNAME     = arista1.example.com
# Space-separated list of uplink ports for bandwidth monitoring and 95th pct.
# Use the port names exactly as shown in 'show interfaces' (e.g. Ethernet49/1).
UPLINK_PORTS       = Ethernet49/1 Ethernet50/1 Ethernet52/1 Ethernet53/1
COMMITMENT_MBPS    = 1000
# Ports to graph individually in Xymon via the [ifstat] "Network Traffic" stanza.
# Use exact names from 'show interfaces'.  Each creates ifstat.<port>.rrd.
# GRAPHED_PORTS      = Ethernet49/1 Ethernet50/1

# Example: duck (Mac mini on Et43) sleeps/wakes intermittently — mute it entirely.
# MUTED_PORTS        = Et43
