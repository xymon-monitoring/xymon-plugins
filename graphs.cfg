# graphs.cfg — Xymon RRD graph definitions for xymon-plugins
#
# Append to /etc/xymon/graphs.cfg on the Xymon server.
#
# Plugins that use each stanza:
#   [net]   arista/arista_monitor.py, ciscoasa/asa_monitor.py
#           Both send "data {host}.net" with DS fields in/out in bits/sec.

[net]
	TITLE Network bandwidth
	YAXIS Mbps
	-l 0
	DEF:in=net.rrd:in:AVERAGE
	DEF:out=net.rrd:out:AVERAGE
	CDEF:inM=in,1000000,/
	CDEF:outM=out,1000000,/
	AREA:inM#00AA00:In
	LINE1:outM#0000CC:Out
	GPRINT:inM:LAST:In\: %5.1lf Mbps (cur)
	GPRINT:inM:MAX: \: %5.1lf Mbps (max)
	GPRINT:outM:LAST:Out\: %5.1lf Mbps (cur)
	GPRINT:outM:MAX: \: %5.1lf Mbps (max)\n
