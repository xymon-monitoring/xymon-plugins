[DEFAULT]
# Xymon server
XYMON_HOST         = xymon.example.com
XYMON_PORT         = 1984

# SSH credentials (override per firewall section)
SSH_USER           = admin
SSH_KEY            = /etc/xymon/ssh/id_rsa_asa
ENABLE_PASSWORD    = <your-enable-password>

# CPU thresholds — 5-minute average (%)
CPU_WARN           = 70
CPU_CRIT           = 85

# Memory used % thresholds
MEM_WARN           = 80
MEM_CRIT           = 90

# Active connection count
CONN_WARN          = 50000
CONN_CRIT          = 80000

# NAT translation table count
XLATE_WARN         = 50000
XLATE_CRIT         = 80000

# Bandwidth commitment in Mbps (95th pct comparison)
COMMITMENT_MBPS    = 100

# 95th pct rolling window in hours (288 samples at 5-min intervals = 24h)
BW_WINDOW_HOURS    = 24

# Per-interface error count (per poll interval) before alerting
IFACE_ERR_WARN     = 10
IFACE_ERR_CRIT     = 100

# --- Firewall instances ---
# Add a new [section] for each additional ASA firewall.
# Keys here override [DEFAULT] values for that firewall only.

[asa1]
HOST               = asa1.example.com
XYMON_HOSTNAME     = asa1.example.com
# nameif of the internet-facing interface (for bandwidth monitoring)
OUTSIDE_IFACE      = outside
# Space-separated list of nameifs to check for interface errors
MONITOR_IFACES     = outside inside
COMMITMENT_MBPS    = 100
