[DEFAULT]
# Xymon server (reachable via tunnel from the outside monitoring host)
XYMON_HOST        = xymon.example.com
XYMON_PORT        = 1984

# Column name reported to Xymon.
# Use "http" to merge with standard Xymon HTTP checks in the grid.
COLUMN            = http

# HTTP request timeout in seconds
TIMEOUT           = 10

# --- Host sections ---
# Add one [section] per Xymon hostname to check.
# XYMON_HOSTNAME must match the hostname as registered in Xymon/hosts.cfg.
# URLS lists one check per line using Xymon hosts.cfg HTTP check syntax:
#
#   [modifier;]...[modifier;]URL[;STATUS]
#
#   Modifiers:
#     nossl          skip TLS certificate verification
#     cont=STRING    response body must contain STRING
#     nocont=STRING  response body must NOT contain STRING
#
#   STATUS: expected HTTP status code (default 200)
#
# Redirects are NOT followed — the raw first response status is checked.
# If a 302 redirect to /login should count as blocked, use ;302.

[web1]
XYMON_HOSTNAME    = web1.example.com
URLS =
    https://web1.example.com/;200
    https://web1.example.com/admin/;403
    https://web1.example.com/server-status;403
    https://web1.example.com/.htaccess;403
    https://web1.example.com/api/internal/;401
